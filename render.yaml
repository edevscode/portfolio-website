services:
  - type: web
    name: portfolio-backend
    env: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        value: portfolio_db_e2ts
      - key: DB_USER
        value: portfolio_db_e2ts_user
      - key: DB_PASSWORD
        value: prLJ9QMghhPuKnZcJ7hta4JHHZ8ggoX9
      - key: DB_HOST
        value: dpg-d6erlb7gi27c73af29ag-a
      - key: DB_PORT
        value: 5432
      - key: DB_SSLMODE
        value: require
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ${RENDER_EXTERNAL_HOSTNAME}
      - key: CORS_ALLOWED_ORIGINS
        value: https://${RENDER_EXTERNAL_HOSTNAME},http://localhost:5173
